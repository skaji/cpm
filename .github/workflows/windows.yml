name: windows

on:
  push:
    branches:
      - '*'
    tags-ignore:
      - '*'
  pull_request:

jobs:
  perl:

    runs-on: windows-latest

    strategy:
      matrix:
        tester-id:
          - '0'
          - '1'
          - '2'

    steps:
      - uses: actions/checkout@v2
      - name: perl -V
        run: perl -V
      - name: Install Dependencies
        run: curl -fsSL https://git.io/cpm | perl - install -g --with-develop --with-recommends --show-build-log-on-failure
      - name: Run Tests
        run: perl author/split-files.pl --file "t/*.t xt/*.t xt/*/*.t" --id ${{ matrix.tester-id }}/3 -- prove -l
