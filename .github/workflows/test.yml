name: test

on:
  push:
    branches:
      - '*'
    tags-ignore:
      - '*'
  pull_request:

jobs:
  ubuntu:
    name: ubuntu perl ${{ matrix.perl-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        perl-version:
          - '5.24.4'
          - '5.42.2'
    steps:
      - uses: actions/checkout@v6
      - name: Install deb packages
        run: sudo apt-get -qq update && sudo apt-get -qq install -y unzip libdb-dev
      - name: Setup perl
        run: |
          curl -fsSL https://github.com/skaji/cpm-test/releases/download/0.01/ubuntu-24.04-perl-${{ matrix.perl-version }}.tar.xz | tar xJf - -C /tmp
          echo /tmp/perl-${{ matrix.perl-version }}/bin >> $GITHUB_PATH
      - run: perl -V
      - name: Install Dependencies
        run: curl -fsSL https://raw.githubusercontent.com/skaji/cpm/main/cpm | perl - install -g --top-level-phase runtime,test,develop --top-level-relationship requires,recommends --show-build-log-on-failure
      - name: Run Tests
        run: prove -lr --timer t xt

  macos:
    name: macos ${{ matrix.perl }}
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - perl: /usr/bin/perl
            prove: /usr/bin/prove
            sudo: 'sudo -H'
          - perl: /opt/homebrew/bin/perl
            prove: /opt/homebrew/bin/prove
            sudo: ''
    steps:
      - uses: actions/checkout@v6
      - name: perl -V
        run: ${{ matrix.perl }} -V
      - name: Install Dependencies
        run: curl -fsSL https://raw.githubusercontent.com/skaji/cpm/main/cpm | ${{ matrix.sudo }} ${{ matrix.perl }} - install -g --top-level-phase runtime,test,develop --top-level-relationship requires,recommends --show-build-log-on-failure
      - name: Run Tests
        run: ${{ matrix.prove }} -lr --timer t xt

  windows:
    name: windows perl ${{ matrix.tester-id }}
    runs-on: windows-latest
    strategy:
      matrix:
        tester-id:
          - '0'
          - '1'
          - '2'
    steps:
      - uses: actions/checkout@v6
      - name: perl -V
        run: perl -V
      - name: Install Dependencies
        run: curl -fsSL https://raw.githubusercontent.com/skaji/cpm/main/cpm | perl - install -g --top-level-phase runtime,test,develop --top-level-relationship requires,recommends --show-build-log-on-failure
      - name: Run Tests
        run: perl author\split-run "t\*.t xt\*.t xt\*\*.t" ${{ matrix.tester-id }}/3 prove -l --timer
